name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.21" # 使用最新稳定版Go

      - name: Build
        run: |
          ls -la
          pwd
          # 检查go.mod是否存在
          if [ ! -f "go.mod" ]; then
            echo "Error: go.mod not found in $(pwd)"
            exit 1
          fi
          go mod tidy
          go build -ldflags="-s -w" -o bin/rightmenu.exe main.go
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/rightmenu.exe
          draft: false
          prerelease: false